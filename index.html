<script>
// ==================== NAVIGAZIONE PANNELLI ====================
function setActivePanel(panelId) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${panelId}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(btn => {
    if(btn.dataset.panel === panelId) btn.classList.add('active');
    else btn.classList.remove('active');
  });
}

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => setActivePanel(btn.dataset.panel));
});

function openWindyInPanel() {
  let lat = 38.1, lon = 13.35;
  if(currentPositionForRoute) { lat = currentPositionForRoute.lat; lon = currentPositionForRoute.lng; }
  window.open(`https://www.windy.com/?${lat.toFixed(4)},${lon.toFixed(4)},8/marine/waves,wind,i:pressure`, '_blank');
}

// ==================== ESPORTAZIONE ROTTA SINGOLA GPX ====================
function exportRouteToGPX(routeName, points) {
  if (!points || points.length < 2) {
    alert("La rotta deve avere almeno 2 waypoint");
    return;
  }
  
  const pointsCopy = JSON.parse(JSON.stringify(points));
  const gpxContent = generateGPX(pointsCopy, routeName, false);
  if (gpxContent) {
    const safeName = routeName.replace(/[^a-z0-9]/gi, '_').substring(0, 50);
    const filename = `${safeName}.gpx`;
    const blob = new Blob([gpxContent], { type: "application/gpx+xml" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
    alert(`✅ Rotta "${routeName}" esportata come ${filename}`);
  }
}

function importSingleRouteFromFile() {
  const fileInput = document.getElementById("importSingleRouteFile");
  if (!fileInput.files.length) { alert("Seleziona un file GPX o JSON"); return; }
  const file = fileInput.files[0];
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const content = e.target.result;
      let points = [];
      if (file.name.toLowerCase().endsWith('.gpx') || content.includes('<gpx')) {
        const trkptRegex = /<trkpt lat="([^"]+)" lon="([^"]+)">/g;
        let match;
        while ((match = trkptRegex.exec(content)) !== null) {
          points.push({ lat: parseFloat(match[1]), lng: parseFloat(match[2]) });
        }
        if (points.length === 0) {
          const rteptRegex = /<rtept lat="([^"]+)" lon="([^"]+)">/g;
          while ((match = rteptRegex.exec(content)) !== null) {
            points.push({ lat: parseFloat(match[1]), lng: parseFloat(match[2]) });
          }
        }
        if (points.length >= 2) {
          const nameMatch = /<name>([^<]+)<\/name>/.exec(content);
          const defaultName = nameMatch ? nameMatch[1] : `Rotta_${new Date().toLocaleTimeString()}`;
          const name = prompt("Nome rotta:", defaultName);
          if (name) { 
            saveRouteToStorage(name, points); 
            waypoints = JSON.parse(JSON.stringify(points)); 
            currentRouteName = name; 
            updateMapDrawingModal(); 
            centerOnRouteModal(); 
            alert(`Rotta "${name}" importata!`); 
          }
        } else alert("GPX non contiene waypoint validi");
      } else {
        const data = JSON.parse(content);
        if (Array.isArray(data) && data.length >= 2 && data[0].lat !== undefined) points = data;
        else if (data.type === "FeatureCollection" && data.features) {
          for (let feat of data.features) {
            if (feat.geometry && feat.geometry.coordinates) {
              for (let coord of feat.geometry.coordinates) points.push({ lng: coord[0], lat: coord[1] });
            }
          }
        }
        if (points.length >= 2) {
          const name = prompt("Nome rotta:", `Rotta_${new Date().toLocaleTimeString()}`);
          if (name) { 
            saveRouteToStorage(name, points); 
            waypoints = JSON.parse(JSON.stringify(points)); 
            currentRouteName = name; 
            updateMapDrawingModal(); 
            centerOnRouteModal(); 
            alert(`Rotta "${name}" importata!`); 
          }
        } else alert("Formato non valido");
      }
      fileInput.value = "";
    } catch(err) { alert("Errore: " + err.message); }
  };
  reader.readAsText(file);
}

const positions = ["GA","PH","DH","GP"];

function loadCustomItemNames() {
  const activeUser = localStorage.getItem("active_user");
  if (!activeUser) return {};
  const saved = localStorage.getItem(`custom_names_${activeUser}`);
  return saved ? JSON.parse(saved) : {};
}

function saveCustomItemNames(customNames) {
  const activeUser = localStorage.getItem("active_user");
  if (activeUser) {
    localStorage.setItem(`custom_names_${activeUser}`, JSON.stringify(customNames));
  }
}

function getSectionItems(sectionName) {
  const customNames = loadCustomItemNames();
  const baseItems = baseDataCheck[sectionName] || [];
  const customKey = `section_${sectionName}`;
  const savedNames = customNames[customKey];
  if (savedNames && Array.isArray(savedNames) && savedNames.length === baseItems.length) {
    return savedNames;
  }
  return [...baseItems];
}

function updateDefaultItemName(sectionName, oldName, newName) {
  const customNames = loadCustomItemNames();
  const sectionKey = `section_${sectionName}`;
  const baseItems = baseDataCheck[sectionName] || [];
  const currentItems = customNames[sectionKey] ? customNames[sectionKey] : [...baseItems];
  const index = currentItems.indexOf(oldName);
  if (index !== -1) {
    currentItems[index] = newName;
    customNames[sectionKey] = currentItems;
    saveCustomItemNames(customNames);
    const stored = loadData();
    const oldCheckboxId = sectionName + "_" + oldName;
    const newCheckboxId = sectionName + "_" + newName;
    if (stored[oldCheckboxId] !== undefined) {
      stored[newCheckboxId] = stored[oldCheckboxId];
      delete stored[oldCheckboxId];
    }
    positions.forEach(p => {
      const oldPosId = oldCheckboxId + "_" + p;
      const newPosId = newCheckboxId + "_" + p;
      if (stored[oldPosId] !== undefined) {
        stored[newPosId] = stored[oldPosId];
        delete stored[oldPosId];
      }
    });
    localStorage.setItem("checklist", JSON.stringify(stored));
  }
}

function loadData() { return JSON.parse(localStorage.getItem("checklist")) || {}; }

function saveCurrentState() {
  let saved = loadData();
  document.querySelectorAll("#app input, #app textarea").forEach(i => {
    if (i.type === "checkbox") {
      saved[i.id] = i.checked;
    } else {
      saved[i.id] = i.value;
    }
  });
  localStorage.setItem("checklist", JSON.stringify(saved));
  let active = localStorage.getItem("active_user");
  if(active) saveCurrentForUser(active);
  return saved;
}

let openSections = new Set();

function toggleSection(headerEl, sectionName) {
  const content = headerEl.nextElementSibling;
  if (content.style.display === "block") {
    content.style.display = "none";
    openSections.delete(sectionName);
  } else {
    content.style.display = "block";
    openSections.add(sectionName);
  }
}

function editDefaultItem(sectionName, oldItemName, currentDisplayName) {
  const newName = prompt("Modifica nome elemento:", currentDisplayName);
  if (!newName || newName === currentDisplayName) return;
  saveCurrentState();
  updateDefaultItemName(sectionName, currentDisplayName, newName);
  const wasOpen = new Set(openSections);
  renderFullChecklist();
  setTimeout(() => {
    for (let secName of wasOpen) {
      const headers = document.querySelectorAll('.section-header');
      for (let h of headers) {
        if (h.innerText.includes(secName) || h.innerHTML.includes(secName)) {
          const content = h.nextElementSibling;
          if (content) content.style.display = "block";
          break;
        }
      }
    }
    if(window.lucide) lucide.createIcons();
  }, 50);
}

function editCustomItem(sectionName, oldItemName, newName) {
  if (!newName || newName === oldItemName) return;
  saveCurrentState();
  const stored = loadData();
  const key = sectionName + "_ALTRO";
  let items = [];
  if (stored[key]) { try { items = JSON.parse(stored[key]); } catch(e) {} }
  const idx = items.indexOf(oldItemName);
  if (idx !== -1) {
    items[idx] = newName;
    stored[key] = JSON.stringify(items);
    const oldCheckboxId = sectionName + "_ALTRO_" + oldItemName;
    const newCheckboxId = sectionName + "_ALTRO_" + newName;
    if (stored[oldCheckboxId] !== undefined) {
      stored[newCheckboxId] = stored[oldCheckboxId];
      delete stored[oldCheckboxId];
    }
    positions.forEach(p => {
      const oldPosId = oldCheckboxId + "_" + p;
      const newPosId = newCheckboxId + "_" + p;
      if (stored[oldPosId] !== undefined) {
        stored[newPosId] = stored[oldPosId];
        delete stored[oldPosId];
      }
    });
  }
  localStorage.setItem("checklist", JSON.stringify(stored));
  const wasOpen = new Set(openSections);
  renderFullChecklist();
  setTimeout(() => {
    for (let secName of wasOpen) {
      const headers = document.querySelectorAll('.section-header');
      for (let h of headers) {
        if (h.innerText.includes(secName) || h.innerHTML.includes(secName)) {
          const content = h.nextElementSibling;
          if (content) content.style.display = "block";
          break;
        }
      }
    }
    if(window.lucide) lucide.createIcons();
  }, 50);
}

function addCustomItem(sectionName) {
  const input = document.getElementById(`new_item_${sectionName}`);
  const itemName = input ? input.value.trim() : prompt("Nome nuovo elemento:");
  if (!itemName) return;
  saveCurrentState();
  const stored = loadData();
  const key = sectionName + "_ALTRO";
  let items = [];
  if (stored[key]) { try { items = JSON.parse(stored[key]); } catch(e) {} }
  if (!items.includes(itemName)) {
    items.push(itemName);
    stored[key] = JSON.stringify(items);
    localStorage.setItem("checklist", JSON.stringify(stored));
  }
  if (input) input.value = "";
  const wasOpen = new Set(openSections);
  renderFullChecklist();
  setTimeout(() => {
    for (let secName of wasOpen) {
      const headers = document.querySelectorAll('.section-header');
      for (let h of headers) {
        if (h.innerText.includes(secName) || h.innerHTML.includes(secName)) {
          const content = h.nextElementSibling;
          if (content) content.style.display = "block";
          break;
        }
      }
    }
    if(window.lucide) lucide.createIcons();
  }, 50);
}

function deleteCustomItem(sectionName, itemName) {
  if (!confirm(`Eliminare "${itemName}" dalla sezione ${sectionName}?`)) return;
  saveCurrentState();
  const stored = loadData();
  const key = sectionName + "_ALTRO";
  let items = [];
  if (stored[key]) { try { items = JSON.parse(stored[key]); } catch(e) {} }
  items = items.filter(i => i !== itemName);
  stored[key] = JSON.stringify(items);
  const prefix = sectionName + "_ALTRO_" + itemName;
  Object.keys(stored).forEach(k => { if(k.startsWith(prefix)) delete stored[k]; });
  localStorage.setItem("checklist", JSON.stringify(stored));
  const wasOpen = new Set(openSections);
  renderFullChecklist();
  setTimeout(() => {
    for (let secName of wasOpen) {
      const headers = document.querySelectorAll('.section-header');
      for (let h of headers) {
        if (h.innerText.includes(secName) || h.innerHTML.includes(secName)) {
          const content = h.nextElementSibling;
          if (content) content.style.display = "block";
          break;
        }
      }
    }
    if(window.lucide) lucide.createIcons();
  }, 50);
}

let emergencyContacts = [];
let currentPositionForSat = null;

  if(s) emergencyContacts=JSON.parse(s); 
  if(emergencyContacts.length===0) emergencyContacts=[
    {name:"Emergenza Mare",phone:"1530",email:"",note:"Numero unico emergenza"},
    {name:"118",phone:"118",email:"",note:"Pronto Soccorso"},
    {name:"Guardia Costiera",phone:"1530",email:"",note:"Soccorso"}
  ]; 
  saveEmergencyContacts(); 
}

function saveEmergencyContacts(){ 
  localStorage.setItem("emergency_contacts", JSON.stringify(emergencyContacts)); 
  renderEmergencyContacts(); 
}

function renderEmergencyContacts(){

    if (content.style.display === "block") {

      openSections.delete("EMERGENZA");

    card.innerHTML=`<div class="contact-info">
        <div class="contact-name">${escapeHtml(ct.name)}</div>
        <div class="contact-detail">📞 ${ct.phone||"—"}</div>
        <div class="contact-detail">${ct.note||""}</div>
      </div>
      <div class="contact-actions">
        <button class="btn-emergency" data-type="sms" data-idx="${idx}">💬 SMS</button>
        <button class="btn-emergency" data-type="call" data-idx="${idx}">📞 Chiama</button>
        <button class="btn-sat" data-type="sat" data-idx="${idx}">🛰️ Sat (copia)</button>
        <button class="edit-contact" data-idx="${idx}">✏️</button>
        <button class="delete-contact" data-idx="${idx}">🗑️</button>
      </div>`; 
    content.appendChild(card); 
  }); 
  
  let add=document.createElement("button"); 
  add.innerHTML='<i data-lucide="plus-circle"></i> Aggiungi contatto'; 
  add.onclick=()=>{ 
    let n=prompt("Nome:"); 
    if(!n) return; 
    let p=prompt("Telefono:"); 
    let email=prompt("Email (opzionale):");
    let note=prompt("Note (opzionale):");
    emergencyContacts.push({name:n,phone:p||"",email:email||"",note:note||""});

    btn.onclick = (e) => {
      e.stopPropagation();
      let idx = btn.dataset.idx;

    };
  });
  
  document.querySelectorAll(".btn-emergency[data-type='call']").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      let idx = btn.dataset.idx;
      let c = emergencyContacts[idx];
      if(c.phone) window.location.href = `tel:${c.phone}`;
      else alert("Numero di telefono non disponibile");
    };
  });
  
  document.querySelectorAll(".btn-sat").forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      let idx = btn.dataset.idx;
      let c = emergencyContacts[idx];
      
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude.toFixed(6);
            const lng = position.coords.longitude.toFixed(6);
            const msg = `🚨 SOS KAYAK 🚨\n\nContatto: ${c.name}\nTelefono: ${c.phone || 'Non disponibile'}\n\n📍 POSIZIONE GPS:\nLat: ${lat}\nLng: ${lng}\nhttps://www.google.com/maps?q=${lat},${lng}\n\n📅 ${new Date().toLocaleString()}\n\nMessaggio: Richiesta assistenza immediata - Kayak expedition`;
            navigator.clipboard.writeText(msg);
            alert(`✅ Messaggio SOS copiato negli appunti!\n\nPosizione GPS: ${lat}, ${lng}\n\nPuoi ora incollarlo nel tuo dispositivo satellitare (InReach, Messenger, ecc.)`);
          },
          (error) => {
            const msg = `🚨 SOS KAYAK 🚨\n\nContatto: ${c.name}\nTelefono: ${c.phone || 'Non disponibile'}\n\n⚠️ GPS non disponibile al momento\nData/Ora: ${new Date().toLocaleString()}\n\nMessaggio: Richiesta assistenza immediata - Kayak expedition`;
            navigator.clipboard.writeText(msg);
            alert(`✅ Messaggio SOS copiato negli appunti!\n\n⚠️ Posizione GPS non disponibile - Inserisci manualmente le coordinate nel messaggio prima di inviare.\n\nPuoi ora incollarlo nel tuo dispositivo satellitare.`);
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      } else {
        const msg = `🚨 SOS KAYAK 🚨\n\nContatto: ${c.name}\nTelefono: ${c.phone || 'Non disponibile'}\n\n⚠️ GPS non supportato\nData/Ora: ${new Date().toLocaleString()}\n\nMessaggio: Richiesta assistenza immediata - Kayak expedition`;
        navigator.clipboard.writeText(msg);
        alert(`✅ Messaggio SOS copiato negli appunti!\n\nPuoi ora incollarlo nel tuo dispositivo satellitare.`);
      }
    };
  });
  
  document.querySelectorAll(".edit-contact").forEach(btn => {

      e.stopPropagation();

      let c = emergencyContacts[idx];

function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g,function(m){return m==='&'?'&amp;':m==='<'?'&lt;':'&gt;';}); }

// ==================== FUNZIONI ROTTE (CORRETTE - SENZA SOVRASCRITTURA) ====================
let routeMap = null, waypoints = [], markers = [], polyline = null, currentRouteName = null, currentPositionForRoute = null;

function haversineDistance(l1,ln1,l2,ln2){ 
  const R=6371; 
  const dLat=(l2-l1)*Math.PI/180; 
  const dLon=(ln2-ln1)*Math.PI/180; 
  const a=Math.sin(dLat/2)**2+Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dLon/2)**2; 
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)); 
}

function calculateTotalDistance(p){ 
  let t=0; 
  for(let i=1;i<p.length;i++) t+=haversineDistance(p[i-1].lat,p[i-1].lng,p[i].lat,p[i].lng); 
  return t; 
}

function updateMapDrawingModal(){ 
  if(!routeMap) return; 
  markers.forEach(m=>routeMap.removeLayer(m)); 
  markers=[]; 
  if(polyline) routeMap.removeLayer(polyline); 
  waypoints.forEach((wp,idx)=>{ 
    let m=L.marker([wp.lat,wp.lng],{draggable:true}); 
    m.bindPopup(`Punto ${idx+1}`); 
    m.on('dragend',e=>{ 
      waypoints[idx]={lat:e.target.getLatLng().lat,lng:e.target.getLatLng().lng}; 
      updateMapDrawingModal(); 
      autoSaveCurrentRouteModal(); 
    }); 
    m.addTo(routeMap); 
    markers.push(m); 
  }); 
  if(waypoints.length>=2) polyline=L.polyline(waypoints.map(wp=>[wp.lat,wp.lng]),{color:'#dc2626',weight:5}).addTo(routeMap); 
  document.getElementById("distanceInfoModal").innerHTML=`📏 Distanza: ${calculateTotalDistance(waypoints).toFixed(2)} km | ${waypoints.length} waypoint`; 
  let cont=document.getElementById("waypointListModal"); 
  if(waypoints.length===0) cont.innerHTML='Clicca sulla mappa per aggiungere waypoint'; 
  else{ 
    let h=''; 
    waypoints.forEach((wp,idx)=>{ 
      let d=0; 
      for(let i=1;i<=idx;i++) d+=haversineDistance(waypoints[i-1].lat,waypoints[i-1].lng,waypoints[i].lat,waypoints[i].lng); 
      h+=`<div class="waypoint-item"><span><strong>${idx+1}</strong> ${wp.lat.toFixed(5)},${wp.lng.toFixed(5)}</span><span>📏 ${d.toFixed(2)} km</span></div>`; 
    }); 
    cont.innerHTML=h; 
  } 
}

function addWaypointModal(lat,lng){ 
  waypoints.push({lat,lng}); 
  updateMapDrawingModal(); 
  autoSaveCurrentRouteModal(); 
}

function undoLastPointModal(){ 
  if(waypoints.length) {
    waypoints.pop(); 
    updateMapDrawingModal(); 
    if(currentRouteName && waypoints.length >= 2) {
      autoSaveCurrentRouteModal();
    } else if(waypoints.length < 2 && currentRouteName) {
      let saved = JSON.parse(localStorage.getItem("saved_routes_permanent") || "{}");
      if(saved[currentRouteName]) {
        if(confirm(`La rotta "${currentRouteName}" non ha più waypoint validi. Eliminarla definitivamente?`)) {
          delete saved[currentRouteName];
          localStorage.setItem("saved_routes_permanent", JSON.stringify(saved));
          currentRouteName = null;
          renderSavedRoutesListModal();
          alert(`Rotta eliminata perché non più valida`);
        }
      }
    }
  } 
}

function clearCurrentRouteModal(){ 
  if(confirm("Cancellare tutti i waypoint dalla mappa?")) {
    waypoints = []; 
    currentRouteName = null; 
    updateMapDrawingModal(); 
  } 
}

function centerOnRouteModal(){ 
  if(routeMap && waypoints.length) routeMap.fitBounds(L.latLngBounds(waypoints.map(wp=>[wp.lat,wp.lng]))); 
}

function autoSaveCurrentRouteModal(){ 
  if(currentRouteName && waypoints.length >= 2) {
    saveRouteToStorage(currentRouteName, waypoints);
    console.log(`Auto-salvataggio rotta "${currentRouteName}" con ${waypoints.length} waypoint`);
  } else if(currentRouteName && waypoints.length < 2) {
    console.log(`Rotta "${currentRouteName}" non salvata - waypoint insufficienti (${waypoints.length})`);
  }
}

function saveRouteToStorage(name, points){
  let saved = JSON.parse(localStorage.getItem("saved_routes_permanent") || "{}");
  saved[name] = JSON.parse(JSON.stringify(points));
  localStorage.setItem("saved_routes_permanent", JSON.stringify(saved));
  renderSavedRoutesListModal();
  console.log(`Rotta "${name}" salvata con ${points.length} waypoint`);
}

function saveCurrentRouteModal(){ 
  if(waypoints.length < 2) {
    alert("Aggiungi almeno 2 waypoint prima di salvare la rotta"); 
    return;
  } 
  let n = prompt("Nome rotta:", currentRouteName || `Rotta_${new Date().toLocaleDateString()}`); 
  if(n){ 
    let saved = JSON.parse(localStorage.getItem("saved_routes_permanent") || "{}");
    if(saved[n] && !confirm(`La rotta "${n}" esiste già. Vuoi sovrascriverla?`)) {
      return;
    }
    currentRouteName = n; 
    saveRouteToStorage(n, waypoints); 
    alert(`Rotta "${n}" salvata con ${waypoints.length} waypoint!`); 
  } 
}

function loadRouteModal(n){ 
  let s = JSON.parse(localStorage.getItem("saved_routes_permanent")||"{}"); 
  if(s[n]){ 
    if(waypoints.length >= 2 && currentRouteName) {
      if(confirm(`Salvare la rotta corrente "${currentRouteName}" prima di caricare "${n}"?`)) {
        saveRouteToStorage(currentRouteName, waypoints);
      }
    }
    waypoints = JSON.parse(JSON.stringify(s[n])); 
    currentRouteName = n; 
    updateMapDrawingModal(); 
    centerOnRouteModal(); 
    alert(`Rotta "${n}" caricata (${waypoints.length} waypoint)`); 
  } else {
    alert(`Rotta "${n}" non trovata`);
  }
}

function deleteSavedRouteModal(n){ 
  if(confirm(`Eliminare definitivamente la rotta "${n}"?`)){ 
    let s=JSON.parse(localStorage.getItem("saved_routes_permanent")||"{}"); 
    delete s[n]; 
    localStorage.setItem("saved_routes_permanent",JSON.stringify(s)); 
    if(currentRouteName === n){ 
      waypoints=[]; 
      currentRouteName=null; 
      updateMapDrawingModal(); 
    } 
    renderSavedRoutesListModal(); 
    alert(`Rotta "${n}" eliminata`); 
  } 
}

function newRouteModal(){
  if(waypoints.length >= 2 && currentRouteName) {
    if(confirm(`Vuoi salvare la rotta corrente "${currentRouteName}" prima di crearne una nuova?`)) {
      saveRouteToStorage(currentRouteName, waypoints);
    }
  }
  waypoints = [];
  currentRouteName = null;
  updateMapDrawingModal();
  alert("Nuova rotta creata. Aggiungi waypoint cliccando sulla mappa.");
}

function renderSavedRoutesListModal(){ 
  let s=JSON.parse(localStorage.getItem("saved_routes_permanent")||"{}"); 
  let c=document.getElementById("savedRoutesListModal"); 
  if(!c) return; 
  if(Object.keys(s).length===0){ 
    c.innerHTML="<div>Nessuna rotta salvata</div>"; 
    return; 
  } 
  let h=''; 
  for(let n in s){ 
    let d=calculateTotalDistance(s[n]); 
    let safeName = n.replace(/'/g, "\\'").replace(/"/g, '&quot;');
    let pointsJson = JSON.stringify(s[n]).replace(/"/g, '&quot;');
    h+=`<div style="display:flex; justify-content:space-between; align-items:center; width:100%; margin:5px 0; background:#e2e8f0; border-radius:32px; padding:6px 12px;">
          <span onclick="loadRouteModal('${safeName}')" style="flex:1; cursor:pointer;">🗺️ ${n} (${d.toFixed(1)} km)</span>
          <button onclick="event.stopPropagation(); exportRouteToGPX('${safeName}', ${pointsJson})" style="background:#007dc3; color:white; margin:0 5px; padding:4px 10px; border:none; border-radius:20px; cursor:pointer;">📁 GPX</button>
          <button onclick="event.stopPropagation(); deleteSavedRouteModal('${safeName}')" style="background:#dc2626; color:white; margin:0; padding:4px 10px; border:none; border-radius:20px; cursor:pointer;">❌</button>
        </div>`; 
  } 
  c.innerHTML = h; 
}

function generateGPX(points,name,extended){ 
  if(points.length<2) return null; 
  let gpx=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="AKC Sea Kayak Expedition Planner" xmlns="http://www.topografix.com/GPX/1/1">\n  <metadata>\n    <name>${escapeXml(name)}</name>\n    <desc>Rotta kayak marino - ${points.length} waypoint - ${calculateTotalDistance(points).toFixed(2)} km</desc>\n  </metadata>\n  <trk>\n    <name>${escapeXml(name)}</name>\n    <trkseg>\n`; 
  points.forEach((p,i)=>{ 
    gpx+=`      <trkpt lat="${p.lat}" lon="${p.lng}">\n        <time>${new Date(Date.now()+i*60000).toISOString()}</time>\n      </trkpt>\n`; 
  }); 
  gpx+=`    </trkseg>\n  </trk>\n  <rte>\n    <name>${escapeXml(name)} - Waypoint</name>\n`; 
  points.forEach((p,i)=>{ 
    gpx+=`    <rtept lat="${p.lat}" lon="${p.lng}">\n      <name>WP${i+1}</name>\n    </rtept>\n`; 
  }); 
  gpx+=`  </rte>\n</gpx>`; 
  return gpx; 
}

function escapeXml(unsafe) { 
  if (!unsafe) return ""; 
  return unsafe.replace(/[<>&'"]/g, function(c) { 
    if (c === '<') return '&lt;'; 
    if (c === '>') return '&gt;'; 
    if (c === '&') return '&amp;'; 
    if (c === "'") return '&apos;'; 
    if (c === '"') return '&quot;'; 
    return c; 
  }); 
}

function initRouteMapModal(centerLat=38.1,centerLon=13.35){ 
  let c=document.getElementById("routeMapFull"); 
  if(!c) return; 
  if(routeMap) routeMap.remove(); 
  routeMap=L.map('routeMapFull').setView([centerLat,centerLon],9); 
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(routeMap); 
  routeMap.on('click',e=>addWaypointModal(e.latlng.lat,e.latlng.lng)); 
}

function getLocationForRouteModal(){ 
  if(navigator.geolocation){ 
    navigator.geolocation.getCurrentPosition(pos=>{ 
      currentPositionForRoute={lat:pos.coords.latitude,lng:pos.coords.longitude};

      document.getElementById("gpsCoordsModal").innerHTML=`📍 GPS: ${currentPositionForRoute.lat.toFixed(5)},${currentPositionForRoute.lng.toFixed(5)}`;

        routeMap.setView([currentPositionForRoute.lat,currentPositionForRoute.lng],13);

      } 
    },()=>alert("GPS non disponibile")); 
  } else alert("GPS non supportato"); 
}

function openRouteModal(){ 
  let m=document.getElementById("routeModal");

  document.body.style.overflow="hidden"; 
  setTimeout(()=>{ 
    if(!routeMap) initRouteMapModal();

function closeRouteModal(){ 
  document.getElementById("routeModal").style.display="none"; 
  document.body.style.overflow=""; 
}

// ==================== ESPORTAZIONE COMPLETA ====================
function exportCompleteList(){
  let u=localStorage.getItem("active_user");
  if(!u){alert("Seleziona un utente");return;}
  let data={
    user:{id:u},
    checklist:loadData(),
    routes:JSON.parse(localStorage.getItem("saved_routes_permanent")||"{}")
  };
  let blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  let a=document.createElement("a"); 
  a.href=URL.createObjectURL(blob); 
  a.download=`${u}_export.json`; 
  a.click();
}

function importCompleteList(e){
  let f=e.target.files[0]; 
  if(!f) return;
  let r=new FileReader();
  r.onload=ev=>{ 
    try{ 
      let d=JSON.parse(ev.target.result); 
      if(d.checklist) localStorage.setItem("checklist",JSON.stringify(d.checklist)); 
      if(d.routes) localStorage.setItem("saved_routes_permanent",JSON.stringify(d.routes)); 
      if(d.user?.id) localStorage.setItem("active_user",d.user.id); 
      location.reload(); 
    } catch(err){alert("Errore import");} 
  };
  r.readAsText(f);
}
